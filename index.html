<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Guru Ganti SKMT (Edisi Master / Siri 3/2026)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for In-Browser JSX Compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- jsPDF & jsPDF-AutoTable -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.6.0/jspdf.plugin.autotable.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Configuration
        const SPREADSHEET_ID = "1txoWim24edQiD2e3OC52Cxt2rmVoZttxhok3Y0b1FUk";
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz_example_endpoint/exec"; 

        // Initial Mock Data to ensure 100% standalone functionality if API is offline
        const INITIAL_TEACHERS = [
            { id: "G001", name: "AHMAD BIN SULAIRMAN", role: "BI", load: 12, historyCount: 2, isManagement: false },
            { id: "G002", name: "SITI AMINAH BINTI ALI", role: "BM", load: 15, historyCount: 1, isManagement: false },
            { id: "G003", name: "CHONG WEI MING", role: "MT", load: 10, historyCount: 4, isManagement: false },
            { id: "G004", name: "SARASWATHY A/P RAMAN", role: "SEJ", load: 14, historyCount: 0, isManagement: false },
            { id: "G005", name: "ZULKIFLI BIN MAHMUD", role: "GB", load: 2, historyCount: 0, isManagement: true },
            { id: "G006", name: "NORAINI BINTI HASSAN", role: "PK", load: 4, historyCount: 0, isManagement: true },
            { id: "G007", name: "MUHAMMAD ARIF BIN IDRIS", role: "PI", load: 16, historyCount: 3, isManagement: false },
            { id: "G008", name: "FATIMAH BINTI OTHMAN", role: "BA", load: 11, historyCount: 1, isManagement: false }
        ];

        const INITIAL_SCHEDULE = [
            { id: "S1", class: "1 Cerdik", period: 1, subject: "BM", teacherId: "G002" },
            { id: "S2", class: "1 Cerdik", period: 2, subject: "BM", teacherId: "G002" },
            { id: "S3", class: "1 Cerdik", period: 3, subject: "BI", teacherId: "G001" },
            { id: "S4", class: "2 Pintar", period: 1, subject: "MT", teacherId: "G003" },
            { id: "S5", class: "2 Pintar", period: 2, subject: "SEJ", teacherId: "G004" },
            { id: "S6", class: "3 Bijak", period: 4, subject: "PI", teacherId: "G007" },
            { id: "S7", class: "3 Bijak", period: 5, subject: "BA", teacherId: "G008" }
        ];

        function App() {
            // States
            const [teachers, setTeachers] = useState(INITIAL_TEACHERS);
            const [schedule, setSchedule] = useState(INITIAL_SCHEDULE);
            const [absences, setAbsences] = useState([]);
            const [programs, setPrograms] = useState([]);
            const [reliefAssignments, setReliefAssignments] = useState([]);
            
            // Form States
            const [selectedAbsentTeacher, setSelectedAbsentTeacher] = useState("");
            const [absenceType, setAbsenceType] = useState("Penuh"); // Penuh, Keluar/Masuk
            const [absencePeriods, setAbsencePeriods] = useState([]);
            const [programClass, setProgramClass] = useState("");
            const [programName, setProgramName] = useState("");

            // UI Control States
            const [activeTab, setActiveTab] = useState("dashboard");
            const [isSyncing, setIsSyncing] = useState(false);
            const [notification, setNotification] = useState(null);

            // Trigger Notification Utility
            const showNotify = (text, type = "success") => {
                setNotification({ text, type });
                setTimeout(() => setNotification(null), 4000);
            };

            // Period Selection Handler for Partial Absence
            const togglePeriodSelection = (period) => {
                if (absencePeriods.includes(period)) {
                    setAbsencePeriods(absencePeriods.filter(p => p !== period));
                } else {
                    setAbsencePeriods([...absencePeriods, period].sort((a, b) => a - b));
                }
            };

            // Main Relief Optimization Algorithm (Smart Penalty Matrix)
            const generateRelief = () => {
                if (absences.length === 0) {
                    showNotify("Tiada guru ganti diperlukan kerana tiada data ketidakhadiran.", "error");
                    return;
                }

                let generated = [];
                let currentTeacherLoads = { ...teachers.reduce((acc, t) => ({ ...acc, [t.id]: t.load }), {}) };
                let currentHistory = { ...teachers.reduce((acc, t) => ({ ...acc, [t.id]: t.historyCount }), {}) };

                // Loop through all classes/periods scheduled for the absent teachers
                absences.forEach(abs => {
                    const absentTeacherSched = schedule.filter(s => s.teacherId === abs.teacherId);
                    
                    absentTeacherSched.forEach(slot => {
                        // Check if the specific period is affected by partial absence
                        if (abs.type === "Keluar/Masuk" && !abs.periods.includes(slot.period)) {
                            return; // Not absent during this specific period
                        }

                        // Check if class is suspended due to school program
                        const isClassInProgram = programs.some(p => p.class === slot.class);
                        if (isClassInProgram) return;

                        // Find Eligible Substitute
                        let bestSubstitute = null;
                        let lowestPenalty = Infinity;

                        teachers.forEach(teacher => {
                            // Rule 1: Cannot substitute yourself or someone who is also absent
                            if (teacher.id === abs.teacherId) return;
                            const isSubAbsent = absences.some(a => a.teacherId === teacher.id && (a.type === "Penuh" || a.periods.includes(slot.period)));
                            if (isSubAbsent) return;

                            // Rule 2: Strict Exclusion for Senior Management (GB/PK)
                            if (teacher.isManagement) return;

                            // Rule 3: Must be free during this period
                            const isBusy = schedule.some(s => s.teacherId === teacher.id && s.period === slot.period);
                            if (isBusy) return;

                            // Calculate Penalty Index Matrix
                            let penalty = 0;
                            penalty += currentTeacherLoads[teacher.id] * 2;   // Current load weight
                            penalty += currentHistory[teacher.id] * 5;        // 7-day round robin weight
                            
                            // Preference matching: same subject/role gets dynamic bonus reduction
                            if (teacher.role === slot.subject) {
                                penalty -= 8;
                            }

                            if (penalty < lowestPenalty) {
                                lowestPenalty = penalty;
                                bestSubstitute = teacher;
                            }
                        });

                        if (bestSubstitute) {
                            // Update weights globally for iterative distribution balance
                            currentTeacherLoads[bestSubstitute.id] += 1;
                            currentHistory[bestSubstitute.id] += 1;

                            generated.push({
                                id: `R-${Date.now()}-${slot.id}`,
                                period: slot.period,
                                class: slot.class,
                                originalTeacher: teachers.find(t => t.id === abs.teacherId).name,
                                reliefTeacher: bestSubstitute.name,
                                subject: slot.subject
                            });
                        } else {
                            // Fallback if no free teacher fits rules
                            generated.push({
                                id: `R-${Date.now()}-${slot.id}`,
                                period: slot.period,
                                class: slot.class,
                                originalTeacher: teachers.find(t => t.id === abs.teacherId).name,
                                reliefTeacher: "TIADA GURU GANTI (Kekosongan)",
                                subject: slot.subject
                            });
                        }
                    });
                });

                setReliefAssignments(generated);
                showNotify("Jadual Guru Ganti Berjaya Dijana Menggunakan Algoritma Pintar SKMT!");
            };

            // Form Submissions
            const handleAddAbsence = (e) => {
                e.preventDefault();
                if (!selectedAbsentTeacher) return;
                
                if (absences.some(a => a.teacherId === selectedAbsentTeacher)) {
                    showNotify("Guru ini telah ditambah ke dalam senarai ketidakhadiran.", "error");
                    return;
                }

                const newAbsence = {
                    id: `A-${Date.now()}`,
                    teacherId: selectedAbsentTeacher,
                    name: teachers.find(t => t.id === selectedAbsentTeacher).name,
                    type: absenceType,
                    periods: absenceType === "Keluar/Masuk" ? [...absencePeriods] : [1,2,3,4,5,6]
                };

                setAbsences([...absences, newAbsence]);
                setSelectedAbsentTeacher("");
                setAbsencePeriods([]);
                showNotify("Rekod ketidakhadiran berjaya ditambahkan.");
            };

            const handleAddProgram = (e) => {
                e.preventDefault();
                if (!programClass || !programName) return;

                const newProgram = {
                    id: `P-${Date.now()}`,
                    class: programClass,
                    name: programName
                };

                setPrograms([...programs, newProgram]);
                setProgramClass("");
                setProgramName("");
                showNotify("Program sekolah berjaya direkodkan.");
            };

            // Cloud Data Sync Simulation
            const syncWithGoogleSheets = () => {
                setIsSyncing(true);
                setTimeout(() => {
                    setIsSyncing(false);
                    showNotify("Data Berjaya Disinkronisasikan Dengan Pangkalan Data Google Sheets SKMT!");
                }, 1500);
            };

            // PDF Generation Engine via jsPDF
            const exportToPDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                doc.setFont("Helvetica", "bold");
                doc.setFontSize(16);
                doc.text("SK METODIST (ACS) SITIAWAN", 14, 20);
                doc.setFontSize(12);
                doc.setFont("Helvetica", "normal");
                doc.text("JADUAL GURU GANTI (RELIEF SHEET) - EDISI MASTER", 14, 27);
                doc.text(`Tarikh Cetakan: ${new Date().toLocaleDateString('ms-MY')}`, 14, 34);
                
                doc.setLineWidth(0.5);
                doc.line(14, 38, 196, 38);

                const tableRows = reliefAssignments.map((r, index) => [
                    index + 1,
                    `Masa / Period ${r.period}`,
                    r.class,
                    r.originalTeacher,
                    r.reliefTeacher,
                    r.subject
                ]);

                doc.autoTable({
                    startY: 45,
                    head: [['Bil', 'Masa / Masa', 'Kelas', 'Guru Asal', 'Guru Ganti', 'Mata Pelajaran']],
                    body: tableRows,
                    theme: 'striped',
                    headStyles: { fillColor: [30, 41, 59] },
                    styles: { font: "Helvetica", fontSize: 10 }
                });

                doc.save(`Jadual_Guru_Ganti_SKMT_${new Date().toISOString().slice(0,10)}.pdf`);
                showNotify("Fail PDF Berjaya Dijana & Dimuat Turun!");
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header Banner */}
                    <header className="bg-slate-900 text-white shadow-md border-b border-slate-800">
                        <div className="max-w-7xl mx-auto px-4 py-5 sm:px-6 lg:px-8 flex flex-col sm:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-amber-500 text-slate-900 p-2.5 rounded-xl font-bold text-xl shadow-inner">SKMT</div>
                                <div>
                                    <h1 className="text-xl font-bold tracking-tight text-white">Sistem Guru Ganti SKMT</h1>
                                    <p className="text-xs text-slate-400 font-medium tracking-wide">EDISI MASTER / SIRI 3/2026</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <button 
                                    onClick={syncWithGoogleSheets}
                                    disabled={isSyncing}
                                    className="bg-slate-800 hover:bg-slate-700 text-slate-200 text-sm font-semibold py-2 px-4 rounded-xl border border-slate-700 transition duration-200 flex items-center gap-2 shadow-sm disabled:opacity-50"
                                >
                                    <span>{isSyncing ? "Menyinkronkan..." : "Sinkronisasi Cloud"}</span>
                                </button>
                                <span className="text-xs bg-slate-800 text-slate-400 border border-slate-700 px-3 py-2 rounded-xl font-mono hidden md:inline-block">
                                    ID: {SPREADSHEET_ID.substring(0,6)}...
                                </span>
                            </div>
                        </div>
                    </header>

                    {/* Notification Alert Container */}
                    {notification && (
                        <div className="max-w-7xl mx-auto px-4 mt-4 w-full transition-all duration-300">
                            <div className={`p-4 rounded-xl border flex items-center gap-3 shadow-sm ${
                                notification.type === 'error' ? 'bg-red-50 border-red-200 text-red-800' : 'bg-emerald-50 border-emerald-200 text-emerald-800'
                            }`}>
                                <div className={`w-2 h-2 rounded-full ${notification.type === 'error' ? 'bg-red-500' : 'bg-emerald-500'}`}></div>
                                <p className="text-sm font-medium">{notification.text}</p>
                            </div>
                        </div>
                    )}

                    {/* Navigation Tab Bar */}
                    <nav className="max-w-7xl mx-auto px-4 mt-6 w-full sm:px-6 lg:px-8">
                        <div className="flex bg-slate-200/60 p-1.5 rounded-2xl gap-1">
                            <button 
                                onClick={() => setActiveTab("dashboard")}
                                className={`flex-1 py-2.5 px-4 text-center text-sm font-semibold rounded-xl transition duration-150 ${activeTab === "dashboard" ? "bg-white text-slate-900 shadow-sm" : "text-slate-600 hover:text-slate-900"}`}
                            >
                                Panel Utama
                            </button>
                            <button 
                                onClick={() => setActiveTab("ketidakhadiran")}
                                className={`flex-1 py-2.5 px-4 text-center text-sm font-semibold rounded-xl transition duration-150 ${activeTab === "ketidakhadiran" ? "bg-white text-slate-900 shadow-sm" : "text-slate-600 hover:text-slate-900"}`}
                            >
                                Urus Ketidakhadiran ({absences.length})
                            </button>
                            <button 
                                onClick={() => setActiveTab("program")}
                                className={`flex-1 py-2.5 px-4 text-center text-sm font-semibold rounded-xl transition duration-150 ${activeTab === "program" ? "bg-white text-slate-900 shadow-sm" : "text-slate-600 hover:text-slate-900"}`}
                            >
                                Sekatan Program ({programs.length})
                            </button>
                        </div>
                    </nav>

                    {/* Main Content Area */}
                    <main className="flex-1 max-w-7xl mx-auto px-4 py-6 w-full sm:px-6 lg:px-8">
                        
                        {/* TAB 1: DASHBOARD */}
                        {activeTab === "dashboard" && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                                    <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-xs">
                                        <p className="text-xs font-bold text-slate-400 uppercase tracking-wider">Jumlah Guru Berdaftar</p>
                                        <p className="text-3xl font-bold text-slate-900 mt-1">{teachers.length} Orang</p>
                                        <p className="text-xs text-slate-500 mt-2">Termasuk Pengurusan Kanan (GB/PK)</p>
                                    </div>
                                    <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-xs">
                                        <p className="text-xs font-bold text-slate-400 uppercase tracking-wider">Guru Tidak Hadir Hari Ini</p>
                                        <p className="text-3xl font-bold text-amber-600 mt-1">{absences.length} Orang</p>
                                        <p className="text-xs text-slate-500 mt-2">Memerlukan perlindungan ganti</p>
                                    </div>
                                    <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-xs">
                                        <p className="text-xs font-bold text-slate-400 uppercase tracking-wider">Jadual Ganti Terjana</p>
                                        <p className="text-3xl font-bold text-indigo-600 mt-1">{reliefAssignments.length} Sesi</p>
                                        <p className="text-xs text-slate-500 mt-2">Berdasarkan matriks beban kerja terkini</p>
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl border border-slate-200 shadow-xs overflow-hidden">
                                    <div className="p-5 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-slate-50/70">
                                        <div>
                                            <h3 className="font-bold text-slate-900 text-lg">Hasil Penetapan Jadual Guru Ganti</h3>
                                            <p className="text-xs text-slate-500 mt-0.5">Penetapan automatik pintar bebas daripada konflik jadual bertindih.</p>
                                        </div>
                                        <div className="flex gap-2 w-full sm:w-auto">
                                            <button 
                                                onClick={generateRelief}
                                                className="flex-1 sm:flex-none bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold py-2 px-4 rounded-xl transition duration-150 shadow-sm"
                                            >
                                                Jana Automatik
                                            </button>
                                            {reliefAssignments.length > 0 && (
                                                <button 
                                                    onClick={exportToPDF}
                                                    className="flex-1 sm:flex-none bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-semibold py-2 px-4 rounded-xl transition duration-150 shadow-sm"
                                                >
                                                    Cetak Slip PDF
                                                </button>
                                            )}
                                        </div>
                                    </div>

                                    {reliefAssignments.length === 0 ? (
                                        <div className="p-12 text-center">
                                            <p className="text-slate-400 font-medium text-sm">Tiada rekod jadual ganti dipaparkan.</p>
                                            <p className="text-slate-400 text-xs mt-1">Sila pastikan data ketidakhadiran diisi dan klik butang 'Jana Automatik'.</p>
                                        </div>
                                    ) : (
                                        <div className="overflow-x-auto">
                                            <table className="min-w-full divide-y divide-slate-200 text-left text-sm">
                                                <thead className="bg-slate-50 text-slate-500 uppercase font-semibold text-xs tracking-wider">
                                                    <tr>
                                                        <th className="px-6 py-3.5">Masa (Period)</th>
                                                        <th className="px-6 py-3.5">Kelas</th>
                                                        <th className="px-6 py-3.5">Mata Pelajaran</th>
                                                        <th className="px-6 py-3.5">Guru Asal (Cuti)</th>
                                                        <th className="px-6 py-3.5">Guru Pengganti Disyorkan</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100 font-medium text-slate-700">
                                                    {reliefAssignments.map((assignment) => (
                                                        <tr key={assignment.id} className="hover:bg-slate-50/80 transition duration-100">
                                                            <td className="px-6 py-4">
                                                                <span className="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-bold bg-slate-100 text-slate-800">
                                                                    Masa {assignment.period}
                                                                </span>
                                                            </td>
                                                            <td className="px-6 py-4 font-semibold text-slate-900">{assignment.class}</td>
                                                            <td className="px-6 py-4 text-slate-500">{assignment.subject}</td>
                                                            <td className="px-6 py-4 text-xs text-red-600 font-normal">{assignment.originalTeacher}</td>
                                                            <td className="px-6 py-4">
                                                                <span className={`text-sm font-semibold ${assignment.reliefTeacher.includes("TIADA") ? "text-amber-600" : "text-emerald-700"}`}>
                                                                    {assignment.reliefTeacher}
                                                                </span>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* TAB 2: ABSENCE MANAGEMENT */}
                        {activeTab === "ketidakhadiran" && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-xs h-fit">
                                    <h3 className="font-bold text-slate-900 text-base mb-4">Daftar Guru Tidak Hadir</h3>
                                    <form onSubmit={handleAddAbsence} className="space-y-4">
                                        <div>
                                            <label className="block text-xs font-bold uppercase text-slate-500 mb-1.5">Pilih Nama Guru</label>
                                            <select 
                                                value={selectedAbsentTeacher}
                                                onChange={(e) => setSelectedAbsentTeacher(e.target.value)}
                                                className="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-sm font-medium focus:outline-hidden focus:border-slate-400 focus:bg-white"
                                                required
                                            >
                                                <option value="">-- Sila Pilih --</option>
                                                {teachers.map(t => (
                                                    <option key={t.id} value={t.id}>{t.name} ({t.role})</option>
                                                ))}
                                            </select>
                                        </div>

                                        <div>
                                            <label className="block text-xs font-bold uppercase text-slate-500 mb-1.5">Jenis Ketidakhadiran</label>
                                            <div className="grid grid-cols-2 gap-2">
                                                <button 
                                                    type="button"
                                                    onClick={() => { setAbsenceType("Penuh"); setAbsencePeriods([]); }}
                                                    className={`py-2 px-3 text-center text-xs font-semibold rounded-xl border transition ${absenceType === "Penuh" ? "bg-slate-900 text-white border-slate-900" : "bg-slate-50 text-slate-600 border-slate-200 hover:bg-slate-100"}`}
                                                >
                                                    Penuh (Satu Hari)
                                                </button>
                                                <button 
                                                    type="button"
                                                    onClick={() => setAbsenceType("Keluar/Masuk")}
                                                    className={`py-2 px-3 text-center text-xs font-semibold rounded-xl border transition ${absenceType === "Keluar/Masuk" ? "bg-slate-900 text-white border-slate-900" : "bg-slate-50 text-slate-600 border-slate-200 hover:bg-slate-100"}`}
                                                >
                                                    Keluar / Masuk (Masa)
                                                </button>
                                            </div>
                                        </div>

                                        {absenceType === "Keluar/Masuk" && (
                                            <div>
                                                <label className="block text-xs font-bold uppercase text-slate-500 mb-1.5">Pilih Masa / Period Terbatal</label>
                                                <div className="grid grid-cols-3 gap-1.5">
                                                    {[1, 2, 3, 4, 5, 6].map(p => {
                                                        const isSelected = absencePeriods.includes(p);
                                                        return (
                                                            <button
                                                                key={p}
                                                                type="button"
                                                                onClick={() => togglePeriodSelection(p)}
                                                                className={`py-2 text-center text-xs font-bold rounded-lg border transition ${isSelected ? "bg-amber-500 border-amber-500 text-white" : "bg-slate-50 border-slate-200 text-slate-600"}`}
                                                            >
                                                                Masa {p}
                                                            </button>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        )}

                                        <button 
                                            type="submit"
                                            className="w-full bg-slate-950 hover:bg-slate-800 text-white text-sm font-semibold py-2.5 px-4 rounded-xl transition duration-150 shadow-xs"
                                        >
                                            Simpan Rekod Cuti
                                        </button>
                                    </form>
                                </div>

                                <div className="bg-white rounded-2xl border border-slate-200 shadow-xs overflow-hidden lg:col-span-2">
                                    <div className="p-4 border-b border-slate-100 bg-slate-50/70">
                                        <h3 className="font-bold text-slate-900 text-base">Senarai Ketidakhadiran Aktif</h3>
                                    </div>
                                    {absences.length === 0 ? (
                                        <div className="p-12 text-center text-slate-400 text-sm font-medium">
                                            Tiada senarai guru bercuti direkodkan setakat ini.
                                        </div>
                                    ) : (
                                        <div className="overflow-x-auto">
                                            <table className="min-w-full divide-y divide-slate-200 text-left text-sm">
                                                <thead className="bg-slate-50 text-slate-500 uppercase font-semibold text-xs tracking-wider">
                                                    <tr>
                                                        <th className="px-6 py-3">Nama Guru</th>
                                                        <th className="px-6 py-3">Jenis Kawalan</th>
                                                        <th className="px-6 py-3">Siri Masa Impak</th>
                                                        <th className="px-6 py-3 text-right">Tindakan</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100 font-medium text-slate-700">
                                                    {absences.map((abs) => (
                                                        <tr key={abs.id}>
                                                            <td className="px-6 py-4 text-slate-900">{abs.name}</td>
                                                            <td className="px-6 py-4">
                                                                <span className={`inline-flex px-2 py-0.5 rounded text-xs ${abs.type === 'Penuh' ? 'bg-red-50 text-red-700' : 'bg-amber-50 text-amber-700'}`}>
                                                                    {abs.type}
                                                                </span>
                                                            </td>
                                                            <td className="px-6 py-4 font-mono text-xs text-slate-500">
                                                                {abs.periods.map(p => `[Masa ${p}]`).join(', ')}
                                                            </td>
                                                            <td className="px-6 py-4 text-right">
                                                                <button 
                                                                    onClick={() => setAbsences(absences.filter(a => a.id !== abs.id))}
                                                                    className="text-xs font-semibold text-red-500 hover:text-red-700 hover:underline"
                                                                >
                                                                    Padam
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* TAB 3: PROGRAM / RESTRICTIONS */}
                        {activeTab === "program" && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-xs h-fit">
                                    <h3 className="font-bold text-slate-900 text-base mb-4">Tambah Sekatan Program</h3>
                                    <form onSubmit={handleAddProgram} className="space-y-4">
                                        <div>
                                            <label className="block text-xs font-bold uppercase text-slate-500 mb-1.5">Kelas Terpilih</label>
                                            <select 
                                                value={programClass}
                                                onChange={(e) => setProgramClass(e.target.value)}
                                                className="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-sm font-medium focus:outline-hidden focus:border-slate-400 focus:bg-white"
                                                required
                                            >
                                                <option value="">-- Pilih Kelas --</option>
                                                <option value="1 Cerdik">1 Cerdik</option>
                                                <option value="2 Pintar">2 Pintar</option>
                                                <option value="3 Bijak">3 Bijak</option>
                                            </select>
                                        </div>

                                        <div>
                                            <label className="block text-xs font-bold uppercase text-slate-500 mb-1.5">Nama Program / Aktiviti Sekolah</label>
                                            <input 
                                                type="text"
                                                value={programName}
                                                onChange={(e) => setProgramName(e.target.value)}
                                                placeholder="Contoh: Kejohanan Sukan, Bengkel"
                                                className="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-sm font-medium focus:outline-hidden focus:border-slate-400 focus:bg-white"
                                                required
                                            />
                                        </div>

                                        <button 
                                            type="submit"
                                            className="w-full bg-indigo-950 hover:bg-indigo-900 text-white text-sm font-semibold py-2.5 px-4 rounded-xl transition duration-150 shadow-xs"
                                        >
                                            Lock Kelas / Program
                                        </button>
                                    </form>
                                </div>

                                <div className="bg-white rounded-2xl border border-slate-200 shadow-xs overflow-hidden lg:col-span-2">
                                    <div className="p-4 border-b border-slate-100 bg-slate-50/70">
                                        <h3 className="font-bold text-slate-900 text-base">Senarai Kelas Dikunci (Program Aktif)</h3>
                                    </div>
                                    {programs.length === 0 ? (
                                        <div className="p-12 text-center text-slate-400 text-sm font-medium">
                                            Tiada sebarang sekatan program aktif buat masa ini. Kelas berjalan seperti biasa.
                                        </div>
                                    ) : (
                                        <div className="overflow-x-auto">
                                            <table className="min-w-full divide-y divide-slate-200 text-left text-sm">
                                                <thead className="bg-slate-50 text-slate-500 uppercase font-semibold text-xs tracking-wider">
                                                    <tr>
                                                        <th className="px-6 py-3">Kelas Terlibat</th>
                                                        <th className="px-6 py-3">Nama Program Catatan</th>
                                                        <th className="px-6 py-3 text-right">Tindakan</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100 font-medium text-slate-700">
                                                    {programs.map((prog) => (
                                                        <tr key={prog.id}>
                                                            <td className="px-6 py-4 text-slate-900 font-semibold">{prog.class}</td>
                                                            <td className="px-6 py-4 text-indigo-700 bg-indigo-50/50 text-xs px-2.5 py-1 rounded-md">{prog.name}</td>
                                                            <td className="px-6 py-4 text-right">
                                                                <button 
                                                                    onClick={() => setPrograms(programs.filter(p => p.id !== prog.id))}
                                                                    className="text-xs font-semibold text-red-500 hover:text-red-700 hover:underline"
                                                                >
                                                                    Buka Kunci
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer Rights */}
                    <footer className="bg-white border-t border-slate-200 mt-auto py-4 text-center text-xs text-slate-400 font-medium">
                        &copy; 2026 Sistem Guru Ganti SKMT. Hak Cipta Terpelihara. Managed Node Cloud Sync.
                    </footer>
                </div>
            );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
